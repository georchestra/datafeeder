name: DataKern CI

on:
  push:
    branches:
      - main
    tags:
      - "*"

  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    name: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install backend deps
        run: uv sync --project ./apps/backend
      
      - name: Lint code
        working-directory: ./apps/backend
        run: uv run poe lint
      
      - name: Format code
        working-directory: ./apps/backend
        run: uv run poe fmt
      
      - name: Type check
        working-directory: ./apps/backend
        run: uv run poe check --verbose
      
      - name: Run tests
        working-directory: ./apps/backend
        run: uv run pytest tests/ -v
      
      - name: Build Docker image
        run: docker build -f ./apps/backend/Dockerfile --target production -t backend .

  data-manipulation:
    runs-on: ubuntu-latest
    name: Data Manipulation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install data manipulation deps
        run: uv sync --project ./libs/data_manipulation

      - name: Lint code
        working-directory: ./libs/data_manipulation
        run: uv run poe lint
      
      - name: Format code
        working-directory: ./libs/data_manipulation
        run: uv run poe fmt
      
      - name: Type check
        working-directory: ./libs/data_manipulation
        run: uv run poe check --verbose
  
  airflow-elt:
    runs-on: ubuntu-latest
    name: Airflow ELT
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Airflow deps
        run: uv sync --project ./apps/elt

      - name: Lint code
        working-directory: ./apps/elt
        run: uv run poe lint
      
      - name: Format code
        working-directory: ./apps/elt
        run: uv run poe fmt

      - name: Type check
        working-directory: ./apps/elt
        run: uv run poe check --verbose
