name: build-docker-images.yml
on:
  push:
    branches:
      - main

jobs:
  build-database:
    runs-on: ubuntu-latest
    name: Build & push database
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build database
        run: |
          docker compose --profile datafeeder build database
          docker tag datafeeder-database:latest ghcr.io/camptocamp/datafeeder/datafeeder-python-database:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push database
        run: docker push ghcr.io/camptocamp/datafeeder/datafeeder-python-database:latest

  build-frontend:
    runs-on: ubuntu-latest
    name: Build & push frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend
        run: |
          docker compose --profile datafeeder build datafeeder-frontend
          docker tag datafeeder-datafeeder-frontend:latest ghcr.io/camptocamp/datafeeder/datafeeder-python-frontend:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push frontend
        run: docker push ghcr.io/camptocamp/datafeeder/datafeeder-python-frontend:latest

  build-backend:
    runs-on: ubuntu-latest
    name: Build & push backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        run: |
          docker build -f ./apps/backend/Dockerfile -t ghcr.io/camptocamp/datafeeder/datafeeder-python-backend:latest --target production .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend
        run: docker push ghcr.io/camptocamp/datafeeder/datafeeder-python-backend:latest

  build-airflow:
    runs-on: ubuntu-latest
    name: Build & push airflow
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build airflow
        run: |
          docker build -f ./docker/Dockerfile.airflow -t ghcr.io/camptocamp/datafeeder/datafeeder-python-airflow:latest --target airflow_prod .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push airflow
        run: docker push ghcr.io/camptocamp/datafeeder/datafeeder-python-airflow:latest