name: build-docker-images.yml
on:
  push:
    branches:
      - main

jobs:
    build-docker-images:
        runs-on: ubuntu-latest
        name: Build Docker Images

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

          - name: Build database and datakern with Docker Compose
            run: | 
              docker compose --profile datakern build datakern-backend datakern-frontend database
              docker tag datakern-database:latest ghcr.io/camptocamp/datakern/datakern-database:latest
              docker tag datakern-datakern-backend:latest ghcr.io/camptocamp/datakern/datakern-backend:latest
              docker tag datakern-datakern-frontend:latest ghcr.io/camptocamp/datakern/datakern-frontend:latest  

          - name: Build Airflow
            run: docker build -f ./docker/Dockerfile.airflow -t ghcr.io/camptocamp/datakern/datakern-airflow:latest .

          - name: Log in to GitHub Container Registry
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

          - name: Push images to GHCR
            run: |
              docker push ghcr.io/camptocamp/datakern/datakern-database:latest
              docker push ghcr.io/camptocamp/datakern/datakern-backend:latest
              docker push ghcr.io/camptocamp/datakern/datakern-frontend:latest
              docker push ghcr.io/camptocamp/datakern/datakern-airflow:latest
