name: Frontend Checks
run-name: 🩺 Frontend quality checks on ${{ github.event_name == 'pull_request' && 'PR' || '🌱' }} ${{ github.event_name == 'pull_request' && github.event.number || github.ref_name }}

env:
  NODE_VERSION: 22.12.0
  GEONETWORK_VERSION: 4.4.8
  ELASTICSEARCH_VERSION: 8.14.3

# This workflow runs for Pull Requests which are not draft,
# as well as commits going to the default branch
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, ready_for_review]

# Only allow concurrent checks on the main branch to keep history
# on QA checks
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/frontend/node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-npm-cypress-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-cypress-

      - name: Install dependencies
        run: npm ci
        if: steps.npm-cache.outputs.cache-hit != 'true'
        
      - name: Lint code
        run: npm run lint
        
      - name: Type check
        run: npm run format:check
        
      - name: Build application
        run: npm run build
        
      - name: Run unit tests
        run: npm run test:ut:ci

      # - name: Create pipeline docker image
      #   working-directory: tools
      #   run: docker build . -f pipelines/Dockerfile -t geonetwork/geonetwork-ui-tools-pipelines:latest

      # - name: Start up backend support services
      #   env:
      #     GEONETWORK_VERSION: ${{ env.GEONETWORK_VERSION }}
      #     ELASTICSEARCH_VERSION: ${{ env.ELASTICSEARCH_VERSION }}
      #     # this is because the xpack.security. params should only be applied to ES v8 and above; using an uppercase prefix makes the params ignored
      #     ES_XPACK_PARAMETER_PREFIX: ${{ !env.ELASTICSEARCH_VERSION.startsWith('8') && 'IGNORE_' || '' }}
      #   working-directory: support-services
      #   run: docker compose up --quiet-pull init

      - name: Run E2E tests
        run: npm run test:e2e:ci

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          allow-empty: true


