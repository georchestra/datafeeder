# Default georchestra gateway specific configuration, always imported from application.yml
# configure target base URL's, headers and role based access, per service name.
# Replaces security-proxy's targets-mapping.properties, headers-mapping.properties, and security-mappings.xml
#
spring.config.import: security.yaml, routes.yaml, roles-mappings.yaml

georchestra:
  gateway:
    default-headers:
      # Default security headers to append to proxied requests
      proxy: true
      username: true
      roles: true
      org: true
      orgname: true
      email: true
      firstName: true
      lastName: true
      userid: false
      lastUpdated: false
      tel: false
      address: false
      title: false
      notes: false
      orgid: false
      orgLastUpdated: false
      jsonUser: false
      jsonOrganization: false
    global-access-rules:
    - intercept-url:
      - /**
      anonymous: true
    services:
      backend:
        target: http://host.docker.internal:8000/
        access-rules:
        - intercept-url: /backend**
          anonymous: false
          allowed-roles: IMPORT
      frontend:
        target: http://host.docker.internal:4200/
        access-rules:
        - intercept-url: /frontend**
          anonymous: false
          allowed-roles: IMPORT
        headers:
          json-user: true
          json-organization: true

---
# docker profile, sets backend services target URLs to match default docker-compose host names and ports
spring.config.activate.on-profile: docker
ldapHost: ldap
georchestra.gateway.services:
  backend.target: http://host.docker.internal:8000/
  #frontend.target: http://frontend:8080/
  frontend.target: http://host.docker.internal:4200/frontend/
  airflow.target: http://airflow-apiserver:8081/execution/

logging:
  level:
    root: warn
    '[reactor.netty.http]': info