[project]
name = "datakern-backend"
version = "0.1.0"
description = "REST API for data ingestion in DataKern"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "fastapi[standard]==0.122.0",
    "uvicorn[standard]==0.38.0",
    "data-manipulation",
]

[dependency-groups]
dev = [
    "ruff",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
data-manipulation = { workspace = true }
