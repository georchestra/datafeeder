[tool.poe.tasks]
lint = "ruff check . --fix"
format = "ruff format ."
type-check= "pyright ."

"ci:format" = "ruff format --check ."
"ci:lint" = "ruff check ."

[project]
name = "datakern-backend"
version = "0.1.0"
description = "REST API for data ingestion in DataKern"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "fastapi[standard]==0.122.0",
    "uvicorn[standard]==0.38.0",
    "data_manipulation",
]

[dependency-groups]
dev = [
    "ruff>0",
    "poethepoet>0",
    "pyright>0",
]

[tool.uv.sources]
data_manipulation = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
