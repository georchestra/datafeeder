<div class="relative">
  <input
    [type]="showPassword() ? 'text' : 'password'"
    [value]="value()"
    (input)="onInput($event)"
    [placeholder]="placeholder()"
    class="gn-ui-text-input pr-10"
  />
  <button
    type="button"
    (click)="togglePasswordVisibility()"
    class="absolute right-3 top-2/3 -translate-y-2/3 text-gray-500 hover:text-gray-700"
    [attr.aria-label]="
      showPassword()
        ? ('input.password.hide' | translate)
        : ('input.password.show' | translate)
    "
  >
    @if (showPassword()) {
    <ng-icon name="iconoirEye" size="20"></ng-icon>
    } @else {
    <ng-icon name="iconoirEyeClosed" size="20"></ng-icon>
    }
  </button>
</div>
