<div class="bg-white shadow-[0px_9px_12px_0px_rgba(9,30,66,0.15),0px_0px_1px_0px_rgba(9,30,66,0.31)] w-[290px] flex flex-col">
  <!-- Filter action -->
  <button
    type="button"
    data-action="filter"
    class="flex items-center justify-between p-[10px] border-b border-gray-300 hover:bg-gray-50 text-left w-full"
    (click)="onAction('filter', $event)"
  >
    <span class="flex-1 text-sm text-black flex items-center gap-1.5">
      <span>{{ 'import.columnAction.menu.filter' | translate }}</span>
      @if (hasFilterActive()) {
        <span
          data-indicator-dot="filter"
          class="inline-block w-2 h-2 rounded-full bg-[#E30513] shrink-0"
        ></span>
      }
    </span>
    <span class="text-gray-400 text-xs ml-2">›</span>
  </button>

  <!-- Change type action -->
  <button
    type="button"
    data-action="changeType"
    class="flex items-center justify-between p-[10px] border-b border-gray-300 hover:bg-gray-50 text-left w-full"
    (click)="onAction('changeType', $event)"
  >
    <span class="flex-1 text-sm text-black flex items-center gap-1.5">
      <span>{{ 'import.columnAction.menu.changeType' | translate }}</span>
      @if (hasCastTypeActive()) {
        <span
          data-indicator-dot="changeType"
          class="inline-block w-2 h-2 rounded-full bg-[#E30513] shrink-0"
        ></span>
      }
    </span>
    <span class="text-gray-400 text-xs ml-2">›</span>
  </button>

  <!-- Remove action -->
  <button
    type="button"
    data-action="remove"
    class="flex items-center justify-between p-[10px] hover:bg-gray-50 text-left w-full"
    (click)="onAction('remove', $event)"
  >
    <span class="flex-1 text-sm text-black">{{ 'import.columnAction.menu.remove' | translate }}</span>
    <svg
      class="w-5 h-5 text-gray-500 shrink-0"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="3 6 5 6 21 6"></polyline>
      <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
      <path d="M10 11v6M14 11v6"></path>
      <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
    </svg>
  </button>
</div>
