<div class="flex flex-col w-full max-w-full min-w-0">
  @if (metadata()) {
  <!-- Title Section -->
  <div class="px-6 pt-6">
    <h2 class="text-lg font-medium text-gray-900 mb-2">Titre de la donnée</h2>

    <mat-form-field appearance="outline" class="w-full">
      <input matInput [formControl]="form.controls.title" />
    </mat-form-field>
  </div>

  <!-- Separator -->
  <div>
    <div class="border-t border-gray-300"></div>
  </div>

  <!-- Preview data Table section -->
  <div class="p-6">
    <h1 class="text-lg font-semibold text-gray-900 mb-2">Aperçu du résultat</h1>

    <div class="overflow-x-auto border border-gray-400">
      @if (dataSource().length > 0) {
      <table mat-table [dataSource]="dataSource()" class="w-auto text-sm">
        @for (column of displayedColumns(); track column) {
        <ng-container [matColumnDef]="column">
          <th
            mat-header-cell
            *matHeaderCellDef
            class="!bg-gray-200 !px-4 !font-semibold !text-gray-900 !whitespace-nowrap !border-b !border-r !border-gray-400 !w-[220px] !min-w-[220px] !max-w-[220px] !h-12 last:!border-r-0"
          >
            {{ column }}
          </th>
          <td
            mat-cell
            *matCellDef="let row"
            class="!px-4 !text-gray-800 !border-b !border-r !border-gray-400 !whitespace-nowrap !w-[220px] !min-w-[220px] !max-w-[220px] !h-[37px] last:!border-r-0"
          >
            {{ row[column] }}
          </td>
        </ng-container>
        }

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns()"
          class="!h-12"
        ></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns()"
          class="!h-[37px] even:!bg-gray-50 hover:!bg-gray-100"
        ></tr>
      </table>
      } @else {
      <div class="p-4 text-center text-gray-500">Aucune donnée disponible</div>
      }
    </div>
  </div>

  } @else {
  <div class="p-4 text-gray-500">Chargement des données...</div>
  }
</div>
