<div class="px-6 py-4 flex w-full max-w-full">
  <div class="flex gap-3 border-gray-300">
    <div class="flex flex-col">
      <span class="text-lg font-medium text-gray-900 mb-2">
        {{ 'import.datasetPreview.proj' | translate }}
      </span>
      <div class="w-48">
        <gn-ui-dropdown-selector
          [title]="''"
          [showTitle]="false"
          [choices]="projections()"
          [selected]="selectedProjection()"
          (selectValue)="selectProjection($any($event))"
        ></gn-ui-dropdown-selector>
      </div>
    </div>
  </div>

  @if (metadata()?.file_type === 'csv') {
  <div class="border-l-[1px] pl-6 ml-6 flex gap-3 align-bottom items-end">
    <div class="flex flex-col">
      <span class="text-lg font-medium text-gray-900 mb-2">
        {{ 'import.datasetPreview.latX' | translate }}
      </span>
      <div class="w-48">
        <gn-ui-dropdown-selector
          [title]="''"
          [showTitle]="false"
          [choices]="columns()"
          [selected]="selectedXCol() ?? ''"
          (selectValue)="selectXCol($any($event))"
        ></gn-ui-dropdown-selector>
      </div>
    </div>
    <gn-ui-button
      [extraClass]="'max-w-14 w-14 max-h-10 h-10 my-[1px]'"
      type="secondary"
      (buttonClick)="onSwitchXY()"
    >
      <ng-icon class="rotate-90" name="iconoirDataTransferBoth"></ng-icon>
    </gn-ui-button>
    <div class="flex flex-col">
      <span class="text-lg font-medium text-gray-900 mb-2">
        {{ 'import.datasetPreview.longY' | translate }}
      </span>
      <div class="w-48">
        <gn-ui-dropdown-selector
          [title]="''"
          [showTitle]="false"
          [choices]="columns()"
          [selected]="selectedYCol() ?? ''"
          (selectValue)="selectYCol($any($event))"
        ></gn-ui-dropdown-selector>
      </div>
    </div>
  </div>
  }
</div>

@if (showError()) {
<div class="mx-7 my-5">
  <app-alert-box
    type="warning"
    [title]="errorTitle()"
    [message]="previewError()!"
    (dismissed)="showError.set(false)"
  />
</div>
}
