@if (metadata()) {
<div class="py-6">

  <div class="mx-7 overflow-x-auto border border-gray-400">
    @if (dataSource().length > 0) {
    <table mat-table [dataSource]="dataSource()" class="w-auto text-sm">
      @for (column of displayedColumns(); track column) {
      <ng-container [matColumnDef]="column">
        <th
          mat-header-cell
          *matHeaderCellDef
          class="!bg-gray-200 !px-4 !font-semibold !text-gray-900 !whitespace-nowrap !border-b !border-r !border-gray-400 !w-[220px] !min-w-[220px] !max-w-[220px] !h-12 last:!border-r-0"
        >
          {{ column }}
        </th>
        <td
          mat-cell
          *matCellDef="let row"
          class="!px-4 !text-gray-900 !border-b !border-r !border-gray-400 !whitespace-nowrap !w-[220px] !min-w-[220px] !max-w-[220px] !h-[37px] last:!border-r-0"
        >
          {{ row[column] }}
        </td>
      </ng-container>
      }

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns()"
        class="!h-12"
      ></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns()"
        class="!h-[37px] even:!bg-gray-50 hover:!bg-gray-100"
      ></tr>
    </table>
    } @else {
    <div class="p-4 text-center text-gray-500">
      {{ 'import.datasetPreviewTable.noDataAvailable' | translate }}
    </div>
    }
  </div>
</div>
}
