<div class="relative">
  <!-- Backdrop for form and menu -->
  @if (isFormOpen() || isMenuOpen()) {
  <div class="fixed inset-0 z-10" (click)="closeForm(); closeMenu()"></div>
  }

  <!-- Split button -->
  <div class="flex">
    <!-- Left: action button -->
    <button
      type="button"
      class="flex items-center gap-2 rounded-l-md border border-r-0 border-primary px-3 py-2 text-sm text-white focus:outline-none transition-colors"
      [class]="isFormOpen() ? 'bg-primary-darker' : 'bg-primary hover:bg-primary-darker'"
      (click)="triggerAction()"
    >
      <ng-icon name="iconoirPlus" size="1em"></ng-icon>
      {{ buttonLabel() | translate }}
    </button>
    <!-- Right: mode picker chevron -->
    <button
      type="button"
      class="flex items-center rounded-r-md border border-primary px-2 py-2 text-white focus:outline-none border-l border-l-white/40 transition-colors"
      [class]="isMenuOpen() ? 'bg-primary-darker' : 'bg-primary hover:bg-primary-darker'"
      (click)="toggleMenu()"
    >
      <ng-icon name="iconoirNavArrowDown" size="1em"></ng-icon>
    </button>
  </div>

  <!-- Mode picker dropdown -->
  @if (isMenuOpen()) {
  <div
    class="absolute right-0 top-full z-20 mt-1 w-64 rounded-lg border border-gray-200 bg-white py-1 shadow-lg"
  >
    <button
      type="button"
      class="flex w-full items-center gap-2 px-4 py-2 text-left text-sm text-gray-2 hover:bg-beige"
      [class.font-semibold]="mode() === 'empty'"
      (click)="selectMode('empty')"
    >
      {{ 'quickImport.modeEmpty' | translate }}
    </button>
    <button
      type="button"
      class="flex w-full items-center gap-2 px-4 py-2 text-left text-sm text-gray-2 hover:bg-beige"
      [class.font-semibold]="mode() === 'with-data'"
      (click)="selectMode('with-data')"
    >
      {{ 'quickImport.modeWithData' | translate }}
    </button>
  </div>
  }

  <!-- Form dropdown (empty mode only) -->
  @if (isFormOpen()) {
  <div
    class="absolute right-0 top-full z-20 mt-1 w-96 rounded-lg border border-gray-200 bg-white p-4 shadow-lg"
  >
    <label for="quickImportTitle" class="mb-1 block text-sm font-medium text-gray-2">
      {{ 'quickImport.titleLabel' | translate }}
    </label>
    <div class="flex items-center rounded-md border border-gray-300 bg-white pr-1 focus-within:border-gray-600">
      <input
        #titleInput
        id="quickImportTitle"
        type="text"
        class="flex-1 rounded-md px-3 py-2 text-sm focus:outline-none"
        [placeholder]="'quickImport.titlePlaceholder' | translate"
        [value]="title()"
        (input)="title.set($any($event.target).value)"
        (keydown.enter)="submit()"
      />
      <button
        type="button"
        class="flex items-center justify-center rounded bg-primary px-3 py-1.5 text-sm text-white transition-opacity disabled:opacity-40"
        [disabled]="!title().trim() || submitting()"
        (click)="submit()"
      >
        {{ 'quickImport.create' | translate }}
      </button>
    </div>
  </div>
  }
</div>
