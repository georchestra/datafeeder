<div
  class="p-3 bg-white flex flex-col gap-2 w-[280px]"
  (click)="$event.stopPropagation()"
>
  <!-- Active filter chip -->
  @if (activeFilter(); as filter) {
  <div
    data-active-filter
    class="flex items-center bg-white border border-[#cccdd2] rounded h-7 pl-3 pr-0.5 gap-2 overflow-hidden"
  >
    <span class="flex-1 truncate text-sm">
      <span class="text-[#7c7c7c]"
        >{{
          'import.columnFilter.operator.' + filter.operator | translate
        }}
        :</span
      >
      <span class="ml-1 text-[#4c4c4c]">{{ filter.value }}</span>
    </span>
    <button
      type="button"
      data-delete-button
      class="shrink-0 bg-[#eeeeee] rounded h-full aspect-square flex items-center justify-center hover:bg-gray-300"
      [attr.aria-label]="'import.columnFilter.delete' | translate"
      (click)="onDelete($event)"
    >
      <ng-icon
        name="iconoirTrash"
        class="text-primary-darker"
      ></ng-icon>
    </button>
  </div>
  }

  <!-- Three filter inputs: one per operator -->
  <div class="flex flex-col gap-[5px]">
    <label
      class="flex items-center gap-2 bg-white border border-[#cccdd2] rounded pl-4 pr-1 h-10 cursor-text hover:border-gray-400 focus-within:border-gray-500"
    >
      <ng-icon
        name="iconoirSearch"
        class="shrink-0 text-primary-darker"
      ></ng-icon>
      <input
        type="text"
        data-contains-input
        class="flex-1 text-sm text-[#4c4c4c] placeholder:text-[#7c7c7c] outline-none bg-transparent"
        [placeholder]="'import.columnFilter.placeholder.contains' | translate"
        [ngModel]="containsValue()"
        (ngModelChange)="containsValue.set($event)"
        (keydown.enter)="onSubmit('contains', containsValue())"
      />
      @if (containsValue().trim()) {
      <button
        type="button"
        data-submit-contains
        class="shrink-0 bg-[#eeeeee] rounded h-8 w-8 flex items-center justify-center hover:bg-gray-300"
        (mousedown)="$event.preventDefault()"
        (click)="onSubmit('contains', containsValue())"
      >
        <ng-icon
          name="iconoirTransitionUp"
          class="text-primary-darker"
        ></ng-icon>
      </button>
      }
    </label>

    <label
      class="flex items-center gap-2 bg-white border border-[#cccdd2] rounded pl-4 pr-1 h-10 cursor-text hover:border-gray-400 focus-within:border-gray-500"
    >
      <ng-icon
        name="iconoirSearch"
        class="shrink-0 text-primary-darker"
      ></ng-icon>
      <input
        type="text"
        data-exactly-input
        class="flex-1 text-sm text-[#4c4c4c] placeholder:text-[#7c7c7c] outline-none bg-transparent"
        [placeholder]="'import.columnFilter.placeholder.exactly' | translate"
        [ngModel]="exactlyValue()"
        (ngModelChange)="exactlyValue.set($event)"
        (keydown.enter)="onSubmit('exactly', exactlyValue())"
      />
      @if (exactlyValue().trim()) {
      <button
        type="button"
        data-submit-exactly
        class="shrink-0 bg-[#eeeeee] rounded h-8 w-8 flex items-center justify-center hover:bg-gray-300"
        (mousedown)="$event.preventDefault()"
        (click)="onSubmit('exactly', exactlyValue())"
      >
        <ng-icon
          name="iconoirTransitionUp"
          class="text-primary-darker"
        ></ng-icon>
      </button>
      }
    </label>

    <label
      class="flex items-center gap-2 bg-white border border-[#cccdd2] rounded pl-4 pr-1 h-10 cursor-text hover:border-gray-400 focus-within:border-gray-500"
    >
      <ng-icon
        name="iconoirSearch"
        class="shrink-0 text-primary-darker"
      ></ng-icon>
      <input
        type="text"
        data-starts-with-input
        class="flex-1 text-sm text-[#4c4c4c] placeholder:text-[#7c7c7c] outline-none bg-transparent"
        [placeholder]="
          'import.columnFilter.placeholder.starts_with' | translate
        "
        [ngModel]="startsWithValue()"
        (ngModelChange)="startsWithValue.set($event)"
        (keydown.enter)="onSubmit('starts_with', startsWithValue())"
      />
      @if (startsWithValue().trim()) {
      <button
        type="button"
        data-submit-starts-with
        class="shrink-0 bg-[#eeeeee] rounded h-8 w-8 flex items-center justify-center hover:bg-gray-300"
        (mousedown)="$event.preventDefault()"
        (click)="onSubmit('starts_with', startsWithValue())"
      >
        <ng-icon
          name="iconoirTransitionUp"
          class="text-primary-darker"
        ></ng-icon>
      </button>
      }
    </label>
  </div>
</div>
