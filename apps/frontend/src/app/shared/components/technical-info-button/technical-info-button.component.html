<button
  #triggerBtn
  type="button"
  data-test="technical-info-button"
  class="flex items-center justify-center p-1 text-gray-600 rounded-full hover:text-gray-900 hover:bg-gray-100 focus:outline-none"
  [class.text-gray-900]="isOpen()"
  [attr.aria-label]="'import.dataSource.technicalInfo.button' | translate"
  [attr.aria-expanded]="isOpen()"
  [title]="'import.dataSource.technicalInfo.button' | translate"
  (click)="togglePanel($event)"
>
  <ng-icon name="iconoirHelpCircle" size="1.5em"></ng-icon>
</button>

<ng-template #panelTemplate>
  <div
    data-test="technical-info-panel"
    role="dialog"
    aria-labelledby="technical-info-title"
    class="z-50 max-w-sm p-4 rounded-lg shadow-md bg-orange-200 border border-red-600"
  >
    <div class="flex gap-2">
      <ng-icon
        name="iconoirHelpCircle"
        size="1.25em"
        class="shrink-0"
      ></ng-icon>
      <div class="text-sm text-gray-900">
        <p id="technical-info-title" class="mb-2 font-semibold">
          {{ 'import.dataSource.technicalInfo.title' | translate }}
        </p>
        <p class="mb-1">
          {{ 'import.dataSource.technicalInfo.formats' | translate }}
        </p>
        <p>
          {{ 'import.dataSource.technicalInfo.maxSize' | translate }}
        </p>
      </div>
    </div>
  </div>
</ng-template>
