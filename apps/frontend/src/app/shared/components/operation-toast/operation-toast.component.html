@if (store.toasts().length > 0) {
<div
  class="absolute top-8 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2"
  data-testid="operation-toast-overlay"
>
  @for (toast of store.toasts(); track toast.id) {
  <div
    [class]="
      toast.type === 'info'
        ? 'flex items-center gap-5 bg-[#e8f8ed] border border-[#2d9c50] rounded-[8px] p-3 w-[474px] shadow-[0px_3px_8px_0px_rgba(9,30,66,0.16),0px_0px_20px_0px_rgba(9,30,66,0.15)]'
        : 'flex items-center gap-5 bg-[#ffe5c8] border border-[#e30513] rounded-[8px] p-3 w-[474px] shadow-[0px_3px_8px_0px_rgba(9,30,66,0.16),0px_0px_20px_0px_rgba(9,30,66,0.15)]'
    "
    data-testid="operation-toast"
  >
    @if (toast.type === 'info') {
    <ng-icon
      name="iconoirCheckCircle"
      class="shrink-0 text-[#2d9c50] text-2xl"
    />
    } @else {
    <ng-icon
      name="iconoirWarningTriangle"
      class="shrink-0 text-[#e30513] text-2xl"
    />
    }
    <span class="flex-1 text-[17px] font-semibold text-black leading-snug">
      {{ toast.translationKey | translate }}
    </span>
    <button
      type="button"
      class="shrink-0 text-black hover:opacity-70"
      (click)="dismiss(toast.id)"
      data-testid="dismiss-button"
      [attr.aria-label]="'errors.toast.dismiss' | translate"
    >
      <ng-icon name="iconoirXmark" class="text-2xl" />
    </button>
  </div>
  }
</div>
}
