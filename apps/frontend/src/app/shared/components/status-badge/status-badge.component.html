<span
  class="inline-block px-5 rounded-lg text-lg text-white font-extrabold"
  [ngClass]="{
    'bg-green-500': status === 'success',
    'bg-red-500': status === 'error',
    'bg-orange-500': status === 'warning',
    'bg-blue-500': status === 'queued',
    'bg-teal-500 animate-pulse': status === 'running'
  }"
>
  {{ ('status.type.' + status) | translate }}
</span>
