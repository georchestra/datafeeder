<div class="flex flex-col gap-2">
  @for (group of groups(); track group.id) {
  <div class="flex items-center justify-between rounded-md bg-beige px-4 py-3">
    <span class="text-sm font-medium text-gray-2">{{ group.label }}</span>
    <div class="w-36">
      <gn-ui-dropdown-selector
        [choices]="ruleChoices"
        [selected]="getRuleValue(group)"
        [showTitle]="false"
        [title]="''"
        (selectValue)="onRuleChange(group, $any($event))"
      />
    </div>
  </div>
  }
</div>
