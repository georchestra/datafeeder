<div class="flex flex-1 min-h-0 flex-col gap-2.5 rounded-lg bg-white px-6 py-6">
  <h1 class="text-xl font-bold text-gray-900 mb-4">
    {{ 'authorizations.title' | translate }}
    <span class="text-black font-extrabold">{{
      store.integrityLink()?.integrity_title
    }}</span>
  </h1>
  @if (mutationError()) {
  <app-ui-alert-box
    type="error"
    [title]="'authorizations.error.mutation.title' | translate"
    [message]="'authorizations.error.mutation.message' | translate"
    (dismissed)="mutationError.set(null)"
  />
  } @if (loadError()) {
  <app-ui-alert-box
    type="error"
    [dismissible]="false"
    [title]="'authorizations.error.load.title' | translate"
    [message]="'authorizations.error.load.message' | translate"
  />
  } @else {
  <div class="grid flex-1 min-h-0 grid-cols-2 gap-6">
    <div class="flex flex-col min-h-0 rounded-lg border border-gray-300 p-6">
      <h2 class="text-l font-bold text-gray-900 mb-2">
        {{ 'authorizations.geonetwork' | translate }}
      </h2>
      @if (intlinkId) {
      <app-authorization-rules
        class="flex-1 min-h-0 flex flex-col"
        [groups]="geonetworkGroups()"
        [rules]="metadataRules()"
        [searchPlaceholder]="'authorizations.geonetwork.search' | translate"
        (ruleChange)="onMetadataRuleChange($event)"
      />
      }
    </div>
    <div class="flex flex-col min-h-0 rounded-lg border border-gray-300 p-6">
      <h2 class="text-l font-bold text-gray-900 mb-2">
        {{ 'authorizations.geoserver' | translate }}
      </h2>
      @if (intlinkId) {
      <app-authorization-rules
        class="flex-1 min-h-0 flex flex-col"
        [groups]="geoserverGroups()"
        [rules]="dataRules()"
        [searchPlaceholder]="'authorizations.geoserver.search' | translate"
        (ruleChange)="onDataRuleChange($event)"
      />
      }
    </div>
  </div>
  }
</div>
