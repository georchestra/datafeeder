<div class="flex flex-1 min-h-0 flex-col gap-2.5 rounded-lg bg-white px-6 py-6">
  <h1 class="text-xl font-bold text-gray-900 mb-4">
    {{ 'authorizations.title' | translate }}
    <span class="text-black font-extrabold">{{
      integrityLink()?.integrity_title
    }}</span>
  </h1>
  <div class="grid flex-1 min-h-0 grid-cols-2 gap-6">
    <div class="flex flex-col min-h-0 rounded-lg border border-gray-300 p-6">
      <h2 class="text-xl font-bold text-gray-900 mb-2">
        {{ 'authorizations.geonetwork' | translate }}
      </h2>
      @if (intlinkId) {
      <app-geonetwork-authorizations
        class="flex-1 min-h-0 flex flex-col"
        [intlinkId]="intlinkId"
        ruleType="METADATA"
        [rules]="metadataRules()"
        (rulesChanged)="loadRules(intlinkId)"
      />
      }
    </div>
    <div class="flex flex-col min-h-0 rounded-lg border border-gray-300 p-6">
      <h2 class="text-xl font-bold text-gray-900">
        {{ 'authorizations.geoserver' | translate }}
      </h2>
    </div>
  </div>
</div>
