<div
  class="bg-white flex flex-col gap-2.5 rounded-lg px-6 pt-6 pb-16 shadow-md"
>
  <div>
    <h1 class="text-xl font-bold text-gray-900 mb-4">
      {{ 'events.title' | translate }}
      <span class="text-black font-extrabold">{{
        store.integrityLink()?.integrity_title
      }}</span>
    </h1>

    @if (store.integrityLink()?.source_import_type !== 'file') {
    <div class="shrink-0 w-[400px]">
      <h2 class="text-lg font-medium text-gray-900 mb-2">
        {{ 'import.recurrence.label' | translate }}
      </h2>
      <app-recurrence-selector
        [presets]="recurrencePresets()"
        [selectedPresetId]="selectedPresetId()"
        (presetChange)="selectedPresetId.set($any($event))"
      />
    </div>
    }
  </div>

  @if (loadError()) {
  <app-ui-alert-box
    type="error"
    [title]="'events.error.load.title' | translate"
    [message]="'events.error.load.message' | translate"
    (dismissed)="loadError.set(null)"
  />
  } @if (downloadError()) {
  <app-ui-alert-box
    type="error"
    [title]="'events.error.downloadLogs.title' | translate"
    [message]="'events.error.downloadLogs.message' | translate"
    (dismissed)="downloadError.set(null)"
  />
  }

  <app-events-list
    [events]="events()"
    [reference]="intlink_id || ''"
    [downloadingEventId]="downloadingEventId()"
    (downloadLogsClicked)="onDownloadLogsClicked($event)"
    (refreshRequested)="onRefreshRequested()"
  />
</div>
