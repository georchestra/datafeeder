<div class="bg-white flex flex-col gap-2.5 rounded-lg px-6 pt-8 pb-16">
  <h1 class="text-xl font-extrabold text-gray-900">
    {{ 'events.title' | translate }} {{ integrity_link()?.integrity_title }}
  </h1>
  <app-events-list
    [events]="events()"
    [reference]="intlink_id || ''"
    [downloadingEventId]="downloadingEventId()"
    (downloadLogsClicked)="onDownloadLogsClicked($event)"
  />
</div>
