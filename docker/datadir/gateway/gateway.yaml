# Default georchestra gateway specific configuration, always imported from application.yml
# configure target base URL's, headers and role based access, per service name.
# Replaces security-proxy's targets-mapping.properties, headers-mapping.properties, and security-mappings.xml
#
spring.config.import: application.yaml, security.yaml, routes.yaml, roles-mappings.yaml

georchestra:
  gateway:
    default-headers:
      # Default security headers to append to proxied requests
      proxy: true
      username: true
      roles: true
      org: true
      orgname: true
      email: true
      firstName: true
      lastName: true
      userid: false
      lastUpdated: false
      tel: false
      address: false
      title: false
      notes: false
      orgid: false
      orgLastUpdated: false
      jsonUser: false
      jsonOrganization: false
    global-access-rules:
    - intercept-url:
      - /**
      anonymous: true
    services:
      backend:
        target: ${georchestra.gateway.services.backend.target}
        access-rules:
        - intercept-url: /datakern-backend/internal/**
          anonymous: false
          allowed-roles: ADMINISTRATOR
        - intercept-url: /datakern-backend**, /datakern-backend/**
          anonymous: false
          allowed-roles: IMPORT
      frontend:
        target: ${georchestra.gateway.services.frontend.target}
        access-rules:
        - intercept-url: /datakern**, /datakern/**
          anonymous: false
          allowed-roles: IMPORT
        headers:
          json-user: true
          json-organization: true
      geoserver:
        target: http://geoserver:8080/
        access-rules:
        - intercept-url: /geoserver**
          anonymous: false
          allowed-roles: IMPORT

logging:
  level:
    root: warn
    '[reactor.netty.http]': info
