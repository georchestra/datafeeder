# File included by gateway.yaml to set up the spring-gateway's routes
# target service URL's are defined in gateway.yaml (e.g. georchestra.gateway.services.<service>.target)

spring:
  cloud:
    gateway:
      routes:
      - id: root
        uri: no://op
        predicates:
          - Path=/
        filters:
          - RedirectTo=307, /datafeeder/
      - id: backend
        uri: ${georchestra.gateway.services.backend.target}
        predicates:
        - Path=/datafeeder-backend/**,/openapi.json
        filters:
          - RewritePath=/datafeeder-backend/(?<segment>.*),/$\{segment}
      - id: frontend
        uri: ${georchestra.gateway.services.frontend.target}
        predicates:
        - Path=/datafeeder/**
        filters:
        # https://github.com/spring-cloud/spring-cloud-gateway/issues/1748
        - RewritePath=/datafeeder,/datafeeder/
      - id: airflow
        uri: ${georchestra.gateway.services.airflow.target}
        predicates:
        - Path=/airflow/**
      - id: console
        uri: ${georchestra.gateway.services.console.target}
        predicates:
          - Path=/console/**
      - id: geonetwork
        uri: ${georchestra.gateway.services.geonetwork.target}
        predicates:
          - Path=/geonetwork/**
        filters:
          - name: CookieAffinity
            args:
              name: XSRF-TOKEN
              from: /geonetwork
              to: /datahub
      - id: geoserver
        uri: ${georchestra.gateway.services.geoserver.target}
        predicates:
          - Path=/geoserver/**
      - id: datahub
        uri: ${georchestra.gateway.services.datahub.target}
        predicates:
          - Path=/datahub/**

georchestra.gateway.services:
#  backend.target: http://datafeeder-backend:8000/
  backend.target: http://host.docker.internal:8000/
#  frontend.target: http://datafeeder-frontend:8080/datafeeder/
  frontend.target: http://host.docker.internal:4200/datafeeder/
  airflow.target: http://airflow-apiserver:8081/airflow
  # airflow.target: http://localhost:8081/airflow
  console.target: http://console:8080/
  geoserver.target: http://${GEOSERVER_HOST:geoserver}:8080/
  geonetwork.target: http://${GEONETWORK_HOST:geonetwork}:8080/geonetwork/
  datahub.target: http://datahub/datahub/
